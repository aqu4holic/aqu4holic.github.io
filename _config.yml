lang: en
timezone: Asia/Ho_Chi_Minh

title: aquaholic's space
tagline: Building things that work with intuition.
description: >-
  Personal blog by aquaholic — ML engineer @ MoMo, CS student @ VNU-UET.
  Writing about everything that interests me.

url: "https://aqu4holic.github.io"
baseurl: ""

github:
  username: aqu4holic

social:
  name: Thanh-Phat Nguyen (Nguyễn Thành Phát)
  email: # add your email if you want
  links:
    - https://github.com/aqu4holic

avatar: # path to your avatar image, e.g. /assets/img/avatar.jpg

theme_mode: "dark"

toc: true  # table of contents on posts

paginate: 10

# MathJax
math: true

# Comments — disable for now, add later if you want
comments:
  active: ""

# Analytics — add later
analytics:
  google:
    id: ""

# Jekyll
markdown: kramdown
highlighter: rouge

kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - "*.gem"
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
