lang: en
timezone: Asia/Ho_Chi_Minh

title: aquaholic's space
tagline: Building things that work with intuition.
description: >-
  Personal blog by aquaholic — ML engineer @ MoMo, CS student @ VNU-UET.
  Writing about everything that interests me.

url: "https://aqu4holic.github.io"
baseurl: ""

github:
  username: aqu4holic

social:
  name: Thanh-Phat Nguyen (Nguyễn Thành Phát)
  email: # add your email if you want
  links:
    - https://github.com/aqu4holic

avatar: # path to your avatar image, e.g. /assets/img/avatar.jpg

theme_mode: "dark"

toc: true  # table of contents on posts

paginate: 10

# MathJax
math: true

# Comments — disable for now, add later if you want
comments:
  active: ""

# Analytics — add later
analytics:
  google:
    id: ""

# Jekyll
markdown: kramdown
highlighter: rouge

kramdown:
  math_engine: mathjax
  syntax_highlighter: rouge
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # An empty string here means all files in the project
      type: posts
    values:
      layout: post
      comments: true # Enable comments in posts.
      toc: true # Display TOC column in posts.
      # DO NOT modify the following parameter unless you are confident enough
      # to update the code of all other post links in this project.
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# # Plugins
# plugins:
#   - jekyll-feed
#   - jekyll-sitemap
#   - jekyll-seo-tag

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
